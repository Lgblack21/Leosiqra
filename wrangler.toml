name = "leosiqra-cloudflare"
main = "cloudflare/src/index.ts"
compatibility_date = "2026-04-22"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "leosiqra-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "cloudflare/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "leosiqra-assets"

[durable_objects]
bindings = [
  { name = "REALTIME_ROOM", class_name = "RealtimeRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeRoom"]

[vars]
APP_NAME = "Leosiqra"
APP_ENV = "development"
APP_URL = "http://127.0.0.1:8787"
SESSION_COOKIE_NAME = "leosiqra_session"
DEFAULT_FREE_PLAN_DAYS = "0"
MAINTENANCE_BYPASS_ADMIN = "true"
NEXT_PUBLIC_USE_CLOUDFLARE_AUTH = "false"
